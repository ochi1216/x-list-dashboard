<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Xリスト ダイジェスト</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, "Segoe UI", "Hiragino Sans", sans-serif; max-width: 960px; margin: 0 auto; padding: 12px; background: #0f1115; color: #e8e8e8; font-size: 16px; }
  .header-bar { position: sticky; top: 0; z-index: 20; background: #0f1115; padding-top: 2px; margin: 0 -12px; padding-left: 12px; padding-right: 12px; }
  .header-title-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 6px 0; }
  h1 { font-size: 17px; margin: 0; }
  #accordionToggle { background: none; border: 1px solid #333; border-radius: 6px; color: #ccc; font-size: 14px; cursor: pointer; padding: 4px 10px; line-height: 1; flex-shrink: 0; }
  #accordionToggle:hover { background: #1a1d24; }
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; padding: 10px; background: #1a1d24; border-radius: 8px; }
  .controls.collapsed { display: none; }
  .controls input[type="text"] { flex: 1 1 100%; min-width: 0; padding: 10px 12px; border-radius: 8px; border: 1px solid #333; background: #0f1115; color: #eee; font-size: 16px; }
  .controls select { padding: 8px 8px; border-radius: 8px; border: 1px solid #333; background: #0f1115; color: #eee; font-size: 15px; }
  .controls label { display: flex; align-items: center; gap: 6px; font-size: 14px; white-space: nowrap; }
  .controls input[type="checkbox"] { width: 18px; height: 18px; }
  .controls button { padding: 9px 14px; border-radius: 8px; border: 1px solid #333; background: #23272f; color: #eee; cursor: pointer; font-size: 14px; }
  .controls button:hover { background: #2c313b; }
  .controls button.primary { background: #b8860b; border-color: #b8860b; color: #111; font-weight: 600; }
  .controls button.primary:hover { background: #cc9a1c; }
  #status { font-size: 12px; color: #888; margin-bottom: 8px; }
  /* Each author's header+rows are wrapped in .group so position:sticky's
     containing block is just that group — the header stays pinned for
     exactly its own group's scroll range, then hands off to the next.
     Extra padding-bottom makes the outgoing header linger a little into
     the next group's first rows, giving a grace window to tap "mark read"
     right after finishing that author's posts. */
  .group { position: relative; padding-bottom: 36px; }
  .group-header { display: flex; align-items: center; gap: 8px; padding: 9px 12px; margin-top: 10px; background: #1a1d24; border-radius: 6px 6px 0 0; font-size: 14px; color: #ccc; position: sticky; top: var(--header-h, 0px); z-index: 10; flex-wrap: wrap; }
  .group-header .gh-name { color: #6cb8ff; font-weight: 600; }
  .group-header .gh-count { color: #888; }
  .group-header .gh-read-btn { margin-left: auto; padding: 4px 10px; border-radius: 6px; border: 1px solid #333; background: #23272f; color: #ccc; cursor: pointer; font-size: 12px; }
  .group-header .gh-read-btn:hover { background: #2c313b; }

  /* Row: mobile-first — stacked (date/star/handle on top, gist below).
     row-main uses display:contents at wider widths so it collapses into
     the outer flex row for a single-line desktop layout.
     border-left is reserved (transparent) at all times so the gray "read"
     bar appearing doesn't shift layout. */
  .row { display: flex; flex-direction: column; gap: 4px; padding: 10px 12px 10px 9px; border-bottom: 1px solid #22252c; border-left: 3px solid transparent; cursor: pointer; font-size: 16px; }
  .row.read { border-left-color: #55595f; }
  .row.read .gist { color: #8a8f96; }
  .row:hover { background: #1a1d24; }
  .row-main { display: flex; align-items: center; gap: 8px; }
  .row .date { color: #888; font-size: 13px; white-space: nowrap; }
  .row .star { cursor: pointer; font-size: 20px; line-height: 1; padding: 2px 4px; margin: -2px -4px; }
  .row .star.on { color: gold; }
  .row .star.off { color: #444; }
  .row .handle { color: #6cb8ff; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .row .gist { color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 15px; }
  .row .nogist { color: #666; font-style: italic; }

  .detail { padding: 10px 14px 16px; background: #15171d; font-size: 15px; line-height: 1.6; }
  .detail a { color: #6cb8ff; display: inline-block; margin-top: 4px; }
  .detail .tldr { font-size: 15px; color: #ddd; margin-bottom: 6px; }
  .hidden { display: none; }

  .row.active-read { background: rgba(229,62,62,0.12); box-shadow: inset 0 0 0 2px rgba(229,62,62,0.6); }

  /* 読み上げ用フローティングボタン（ホバーボタン） */
  .fab-container { position: fixed; top: 50%; right: 10px; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 500; pointer-events: none; }
  .fab { position: relative; pointer-events: auto; width: 50px; height: 50px; border-radius: 25px; background: rgba(255,255,255,0.08); color: #6cb8ff; border: 1px solid rgba(108,184,255,0.35); box-shadow: 0 2px 8px rgba(0,0,0,0.35); display: flex; justify-content: center; align-items: center; cursor: pointer; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; font-size: 19px; transition: transform 0.12s, background 0.12s; touch-action: manipulation; }
  .fab:active { transform: scale(0.92); }
  .fab.author-nav { font-size: 15px; }
  .fab.primary { border: 2px solid #6cb8ff; }
  .fab.primary.playing { background: rgba(229,62,62,0.8); color: #fff; border-color: transparent; }
  .fab.speed { font-size: 13px; font-weight: bold; overflow: visible; }

  .speed-hover-group { position: absolute; right: 58px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: row; gap: 5px; opacity: 0; pointer-events: none; transition: opacity 0.15s ease; white-space: nowrap; }
  .speed-hover-group.visible { opacity: 1; pointer-events: auto; }
  .speed-hover-btn { width: 38px; height: 38px; border-radius: 19px; background: rgba(15,17,21,0.95); color: #6cb8ff; border: 1px solid rgba(108,184,255,0.45); box-shadow: 0 2px 8px rgba(0,0,0,0.35); display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 11px; font-weight: bold; touch-action: manipulation; }
  .speed-hover-btn.active-speed { background: #3182ce; color: #fff; border-color: #3182ce; }

  @media (min-width: 640px) {
    body { font-size: 14px; padding: 16px; }
    .header-bar { margin: 0 -16px; padding-left: 16px; padding-right: 16px; }
    h1 { font-size: 18px; }
    .controls input[type="text"] { flex: 1; min-width: 160px; }
    .row { flex-direction: row; align-items: baseline; column-gap: 10px; padding: 7px 10px 7px 7px; font-size: 14px; }
    .row-main { display: contents; }
    .row .date { width: 64px; flex-shrink: 0; font-size: 12px; }
    .row .star { font-size: 16px; padding: 0; margin: 0; }
    .row .handle { width: 150px; flex: 0 0 150px; }
    .row .gist { flex: 1; font-size: 14px; }
    .detail { padding-left: 96px; font-size: 13px; }
    .detail .tldr { font-size: 14px; }
  }
</style>
</head>
<body>
<div class="header-bar" id="headerBar">
  <div class="header-title-row">
    <h1 id="pageTitle">Xリスト ダイジェスト（未読 0件）</h1>
    <button id="accordionToggle" aria-expanded="true">▲ 閉じる</button>
  </div>
  <div class="controls" id="controlsPanel">
    <label><input type="checkbox" id="starOnly"> ★のみ表示</label>
    <label><input type="checkbox" id="unreadOnly"> 未読のみ表示</label>
    <label><input type="checkbox" id="groupByAuthor" checked> 投稿者でグループ化</label>
    <select id="groupSort">
      <option value="count_desc">投稿数が多い順</option>
      <option value="count_asc">投稿数が少ない順</option>
      <option value="name_asc">投稿者名 A→Z</option>
      <option value="name_desc">投稿者名 Z→A</option>
    </select>
    <input type="text" id="search" placeholder="投稿者・本文で検索">
    <button id="reload">再読込</button>
    <button id="toggleAll" class="primary">すべて閉じる</button>
    <button id="markAllRead">すべて既読</button>
  </div>
</div>
<div id="status">読み込み中...</div>
<div id="list"></div>

<div class="fab-container" id="fabContainer">
  <div class="fab speed" id="btnSpeed">1.5x<div class="speed-hover-group" id="speedHoverGroup"></div></div>
  <div class="fab author-nav" id="btnAuthorPrev" title="前の投稿者へ">⏫</div>
  <div class="fab" id="btnCardPrev" title="前のカードへ">▲</div>
  <div class="fab" id="btnCardNext" title="次のカードへ">▼</div>
  <div class="fab author-nav" id="btnAuthorNext" title="次の投稿者へ">⏬</div>
  <div class="fab primary" id="btnPlayPause" title="読み上げ開始/停止">▶️</div>
</div>

<script>
const SUPABASE_URL = "https://bpdkdwtevqsqgsxlahmd.supabase.co";
const SUPABASE_KEY = "sb_publishable_obsKI3CBaB3PtU4Et5FE_w_Iup1JTZW";

async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    const text = await res.text().catch(() => "");
    throw new Error(`${res.status} ${text}`);
  }
  if (res.status === 204) return null;
  return res.json();
}

let posts = [];
let collapsedUrls = new Set(); // post_urls whose detail is manually hidden — empty means all expanded (default)

// 読み上げ（TTS）関連の状態
let flatOrder = [];        // 現在の表示順で並んだpostsのフラット配列（フィルタ/グループ/ソート後）
let authorBoundaries = []; // flatOrder中で「投稿者が変わる/新グループが始まる」インデックス
let activeUrl = null;      // 現在ハイライト＆読み上げ対象のpost_url
let isPlaying = false;
let currentSpeedRate = 1.5;
const speedOptions = [1.0, 1.25, 1.5, 1.75, 2.0, 2.5, 3.0];

function fmtDate(iso) {
  if (!iso) return "----/--/--";
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

async function markAsRead(postUrls) {
  return setReadState(postUrls, true);
}

async function setReadState(postUrls, markRead) {
  const targets = postUrls.filter((u) => {
    const p = posts.find((p) => p.post_url === u);
    return p && p.is_read !== markRead;
  });
  if (targets.length === 0) return;
  const inList = targets.map((u) => encodeURIComponent(u)).join(",");
  try {
    await sbFetch(`x_posts?post_url=in.(${inList})`, {
      method: "PATCH",
      headers: { Prefer: "return=minimal" },
      body: JSON.stringify({ is_read: markRead }),
    });
    for (const u of targets) {
      const p = posts.find((p) => p.post_url === u);
      if (p) p.is_read = markRead;
    }
    render();
  } catch (err) {
    console.error("read state update failed", err);
  }
}

function updateHeaderHeightVar() {
  const h = document.getElementById("headerBar").offsetHeight;
  document.documentElement.style.setProperty("--header-h", `${h}px`);
}

function highlightActiveRow(scroll) {
  document.querySelectorAll(".row.active-read").forEach((el) => el.classList.remove("active-read"));
  if (!activeUrl) return;
  const rowEl = document.querySelector(`.row[data-url="${CSS.escape(activeUrl)}"]`);
  if (rowEl) {
    rowEl.classList.add("active-read");
    if (scroll) rowEl.scrollIntoView({ behavior: "smooth", block: "center" });
  }
}

function groupInfoForIndex(idx) {
  let start = 0;
  for (const b of authorBoundaries) {
    if (b <= idx) start = b;
    else break;
  }
  const nextBoundary = authorBoundaries.find((b) => b > idx);
  const end = nextBoundary !== undefined ? nextBoundary : flatOrder.length;
  return { position: idx - start + 1, total: end - start };
}

function speechText(idx) {
  const grouped = document.getElementById("groupByAuthor").checked;
  const p = flatOrder[idx];
  const theme = p.gist || (p.content || "").replace(/\s+/g, " ").slice(0, 60);
  const body = p.summary || "要約はまだありません。";

  if (!grouped) {
    const who = p.author_name || p.author_handle || "";
    return `${who}。${theme}。${body}`;
  }

  const info = groupInfoForIndex(idx);
  let prefix = "";
  if (info.position === 1) {
    const who = p.author_name || p.author_handle || "";
    prefix = `${who} ${info.total}件の投稿です。`;
  }
  return `${prefix}${info.position}. ${theme}。${body}`;
}

function speakCurrent() {
  window.speechSynthesis.cancel();
  if (flatOrder.length === 0) return;
  let idx = flatOrder.findIndex((p) => p.post_url === activeUrl);
  if (idx === -1) {
    idx = 0;
    activeUrl = flatOrder[idx].post_url;
    highlightActiveRow(true);
  }
  const utter = new SpeechSynthesisUtterance(speechText(idx));
  utter.lang = "ja-JP";
  utter.rate = currentSpeedRate;
  utter.onend = () => {
    if (!isPlaying) return;
    const curIdx = flatOrder.findIndex((pp) => pp.post_url === activeUrl);
    const nextIdx = curIdx + 1;
    if (nextIdx < flatOrder.length) {
      activeUrl = flatOrder[nextIdx].post_url;
      highlightActiveRow(true);
      speakCurrent();
    } else {
      isPlaying = false;
      updatePlayButton();
    }
  };
  window.speechSynthesis.speak(utter);
}

function updatePlayButton() {
  const btn = document.getElementById("btnPlayPause");
  btn.textContent = isPlaying ? "⏸️" : "▶️";
  btn.classList.toggle("playing", isPlaying);
}

function moveCard(delta) {
  if (flatOrder.length === 0) return;
  let idx = flatOrder.findIndex((p) => p.post_url === activeUrl);
  if (idx === -1) idx = delta > 0 ? -1 : 0;
  idx = Math.min(Math.max(idx + delta, 0), flatOrder.length - 1);
  activeUrl = flatOrder[idx].post_url;
  highlightActiveRow(true);
  if (isPlaying) speakCurrent();
}

function moveAuthor(delta) {
  if (flatOrder.length === 0 || authorBoundaries.length === 0) return;
  let idx = flatOrder.findIndex((p) => p.post_url === activeUrl);
  if (idx === -1) idx = 0;
  let newIdx;
  if (delta > 0) {
    const next = authorBoundaries.find((b) => b > idx);
    newIdx = next !== undefined ? next : flatOrder.length - 1;
  } else {
    const prevCandidates = authorBoundaries.filter((b) => b < idx);
    newIdx = prevCandidates.length ? prevCandidates[prevCandidates.length - 1] : 0;
  }
  activeUrl = flatOrder[newIdx].post_url;
  highlightActiveRow(true);
  if (isPlaying) speakCurrent();
}

function setSpeed(v) {
  currentSpeedRate = v;
  const btn = document.getElementById("btnSpeed");
  const textNode = Array.from(btn.childNodes).find((n) => n.nodeType === Node.TEXT_NODE);
  if (textNode) textNode.textContent = `${v}x`;
  buildSpeedHoverGroup();
  if (isPlaying) speakCurrent();
}

function buildSpeedHoverGroup() {
  const group = document.getElementById("speedHoverGroup");
  group.innerHTML = "";
  for (const v of speedOptions) {
    const btn = document.createElement("div");
    btn.className = "speed-hover-btn" + (Math.abs(v - currentSpeedRate) < 0.01 ? " active-speed" : "");
    btn.textContent = `${v}x`;
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      setSpeed(v);
      document.getElementById("speedHoverGroup").classList.remove("visible");
    });
    group.appendChild(btn);
  }
}

async function load() {
  document.getElementById("status").textContent = "読み込み中...";
  const oneMonthAgo = new Date(Date.now() - 30*24*60*60*1000).toISOString();
  const filter = `or=(posted_at.gte.${oneMonthAgo},posted_at.is.null)`;
  try {
    const data = await sbFetch(`x_posts?select=*&${filter}&order=fetched_at.desc`);
    posts = data || [];
    document.getElementById("status").textContent = `${posts.length}件`;
    render();
  } catch (err) {
    document.getElementById("status").textContent = "読み込みエラー: " + err.message;
  }
}

function buildRow(p) {
  const row = document.createElement("div");
  row.className = "row" + (p.is_read ? " read" : "");
  row.dataset.url = p.post_url;
  const hasGist = !!p.gist;
  const gistText = p.gist || (p.content || "").replace(/\s+/g, " ").slice(0, 60);
  row.innerHTML = `
    <div class="row-main">
      <span class="date">${fmtDate(p.posted_at || p.fetched_at)}</span>
      <span class="star ${p.is_starred ? "on" : "off"}">★</span>
      <span class="handle">${escapeHtml(p.author_handle)}</span>
    </div>
    <span class="gist ${hasGist ? "" : "nogist"}">${escapeHtml(gistText)}</span>
  `;
  const detail = document.createElement("div");
  detail.className = "detail" + (collapsedUrls.has(p.post_url) ? " hidden" : "");
  detail.innerHTML = `
    <div class="tldr">${p.summary ? escapeHtml(p.summary) : "まだ要約がありません。チャットで「この投稿要約して」と頼んでください。"}</div>
    <a href="${escapeHtml(p.post_url)}" target="_blank" rel="noopener">元投稿を開く</a>
  `;
  row.addEventListener("click", (e) => {
    if (e.target.classList.contains("star")) return;
    const isHidden = detail.classList.toggle("hidden");
    if (isHidden) collapsedUrls.add(p.post_url);
    else collapsedUrls.delete(p.post_url);
    activeUrl = p.post_url;
    highlightActiveRow(false);
  });
  row.querySelector(".star").addEventListener("click", async (e) => {
    e.stopPropagation();
    const newVal = !p.is_starred;
    try {
      await sbFetch(`x_posts?post_url=eq.${encodeURIComponent(p.post_url)}`, {
        method: "PATCH",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({ is_starred: newVal }),
      });
      p.is_starred = newVal;
      render();
    } catch (err) {
      console.error("star update failed", err);
    }
  });
  detail.querySelector("a").addEventListener("click", () => {
    markAsRead([p.post_url]);
  });
  return { row, detail };
}

function render() {
  const starOnly = document.getElementById("starOnly").checked;
  const unreadOnly = document.getElementById("unreadOnly").checked;
  const grouped = document.getElementById("groupByAuthor").checked;
  const groupSort = document.getElementById("groupSort").value;
  const q = document.getElementById("search").value.trim().toLowerCase();
  const listEl = document.getElementById("list");
  listEl.innerHTML = "";
  flatOrder = [];
  authorBoundaries = [];

  const unreadCount = posts.filter(p => !p.is_read).length;
  document.getElementById("pageTitle").textContent = `Xリスト ダイジェスト（未読 ${unreadCount}件）`;
  document.getElementById("markAllRead").textContent = (posts.length > 0 && unreadCount === 0) ? "すべて未読に戻す" : "すべて既読";

  document.getElementById("groupSort").disabled = !grouped;

  const filtered = posts.filter(p => {
    if (starOnly && !p.is_starred) return false;
    if (unreadOnly && p.is_read) return false;
    if (q && !((p.content||"").toLowerCase().includes(q) || (p.author_handle||"").toLowerCase().includes(q) || (p.author_name||"").toLowerCase().includes(q))) return false;
    return true;
  });

  if (!grouped) {
    for (const p of filtered) {
      const { row, detail } = buildRow(p);
      listEl.appendChild(row);
      listEl.appendChild(detail);
      if (flatOrder.length === 0 || flatOrder[flatOrder.length-1].author_handle !== p.author_handle) {
        authorBoundaries.push(flatOrder.length);
      }
      flatOrder.push(p);
    }
    updateHeaderHeightVar();
    highlightActiveRow(false);
    return;
  }

  const groups = new Map();
  for (const p of filtered) {
    const key = p.author_handle || "(unknown)";
    if (!groups.has(key)) groups.set(key, { author_handle: p.author_handle, author_name: p.author_name, posts: [] });
    groups.get(key).posts.push(p);
  }

  let groupList = Array.from(groups.values());
  groupList.sort((a, b) => {
    if (groupSort === "count_desc") return b.posts.length - a.posts.length;
    if (groupSort === "count_asc") return a.posts.length - b.posts.length;
    if (groupSort === "name_asc") return (a.author_handle||"").localeCompare(b.author_handle||"");
    if (groupSort === "name_desc") return (b.author_handle||"").localeCompare(a.author_handle||"");
    return 0;
  });

  for (const g of groupList) {
    const groupEl = document.createElement("div");
    groupEl.className = "group";

    const allRead = g.posts.every((p) => p.is_read);
    const header = document.createElement("div");
    header.className = "group-header";
    header.innerHTML = `<span class="gh-name">${escapeHtml(g.author_handle)}</span> <span>${escapeHtml(g.author_name||"")}</span> <span class="gh-count">${g.posts.length}件</span> <button class="gh-read-btn">${allRead ? "未読に戻す" : "既読にする"}</button>`;
    header.querySelector(".gh-read-btn").addEventListener("click", () => {
      setReadState(g.posts.map((p) => p.post_url), !allRead);
    });
    groupEl.appendChild(header);
    authorBoundaries.push(flatOrder.length);
    for (const p of g.posts) {
      const { row, detail } = buildRow(p);
      groupEl.appendChild(row);
      groupEl.appendChild(detail);
      flatOrder.push(p);
    }
    listEl.appendChild(groupEl);
  }

  updateHeaderHeightVar();
  highlightActiveRow(false);
}

document.getElementById("starOnly").addEventListener("change", render);
document.getElementById("unreadOnly").addEventListener("change", render);
document.getElementById("groupByAuthor").addEventListener("change", render);
document.getElementById("groupSort").addEventListener("change", render);
document.getElementById("search").addEventListener("input", render);
document.getElementById("reload").addEventListener("click", load);
document.getElementById("markAllRead").addEventListener("click", () => {
  const allRead = posts.length > 0 && posts.every((p) => p.is_read);
  setReadState(posts.map((p) => p.post_url), !allRead);
});

let allExpanded = true; // matches the default (empty collapsedUrls = all expanded)
document.getElementById("toggleAll").addEventListener("click", () => {
  allExpanded = !allExpanded;
  if (allExpanded) {
    collapsedUrls.clear();
  } else {
    for (const p of posts) collapsedUrls.add(p.post_url);
  }
  document.getElementById("toggleAll").textContent = allExpanded ? "すべて閉じる" : "すべて開く";
  render();
});

document.getElementById("accordionToggle").addEventListener("click", () => {
  const panel = document.getElementById("controlsPanel");
  const btn = document.getElementById("accordionToggle");
  const collapsed = panel.classList.toggle("collapsed");
  btn.setAttribute("aria-expanded", String(!collapsed));
  btn.textContent = collapsed ? "▼ フィルター" : "▲ 閉じる";
  updateHeaderHeightVar();
});

window.addEventListener("resize", updateHeaderHeightVar);

document.getElementById("btnPlayPause").addEventListener("click", () => {
  if (isPlaying) {
    isPlaying = false;
    window.speechSynthesis.cancel();
  } else {
    isPlaying = true;
    speakCurrent();
  }
  updatePlayButton();
});

document.getElementById("btnCardPrev").addEventListener("click", () => moveCard(-1));
document.getElementById("btnCardNext").addEventListener("click", () => moveCard(1));
document.getElementById("btnAuthorPrev").addEventListener("click", () => moveAuthor(-1));
document.getElementById("btnAuthorNext").addEventListener("click", () => moveAuthor(1));

buildSpeedHoverGroup();
const speedBtn = document.getElementById("btnSpeed");
const speedHoverGroup = document.getElementById("speedHoverGroup");
let speedPressTimer = null;
let speedLongPressed = false;

speedBtn.addEventListener("pointerdown", () => {
  speedLongPressed = false;
  speedPressTimer = setTimeout(() => {
    speedLongPressed = true;
    speedHoverGroup.classList.add("visible");
  }, 450);
});
speedBtn.addEventListener("pointerup", (e) => {
  clearTimeout(speedPressTimer);
  if (e.target.closest(".speed-hover-btn")) return;
  if (!speedLongPressed) {
    let idx = speedOptions.indexOf(currentSpeedRate);
    if (idx === -1) idx = 0;
    idx = (idx + 1) % speedOptions.length;
    setSpeed(speedOptions[idx]);
  }
});
speedBtn.addEventListener("pointerleave", () => clearTimeout(speedPressTimer));
document.addEventListener("click", (e) => {
  if (!e.target.closest("#btnSpeed")) speedHoverGroup.classList.remove("visible");
});

load();
</script>
</body>
</html>
